<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Reset Password</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #dcdcdc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .page-container {
      max-width: 500px;
      width: 95%;
      background: #f4fdfc;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }

    .page-title {
      color: #113f45;
      text-align: center;
      margin-bottom: 20px;
    }

    .reset-form {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .reset-form input {
      display: block;
      width: 90%;
      margin-bottom: 22px;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 14px;
    }

    .reset-form button {
      background-color: #113f45;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    .reset-form button:hover {
      background-color: #0d2f34;
    }

    .form-links {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .form-links a {
      text-decoration: none;
      color: #1a73e8;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <h2 class="page-title">Badili Nenosiri Jipya</h2>
    <div class="reset-form">
      <form action="user_reset_password.html" method="POST">
        <input type="email" name="email" placeholder="Barua pepe">
        <input type="password" name="new-password" placeholder="Nenosiri Jipya">
        <input type="password" name="confirm-password" placeholder="Thibitisha Nenosiri">
        <button type="submit">Sasisha Nenosiri</button>
      </form>
      </div>
    </div>
  </div>
</body>
</html>
