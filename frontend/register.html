{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>
 <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #dcdcdc;
}

.page-container {
  max-width: 1000px;
  margin: 100px auto;
  background: #f4fdfc;
  padding: 10px;
  border-radius: 10px;
}

.page-title {
  color: #113f45;
  margin: 10px 150px;

}

.register-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  gap: 20px;
}

.form-section {
  background: white;
  padding: 30px;
  border-radius: 12px;
  flex: 1;
  box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
  width: 100%;
}

.form-section h2 {
  color:#113f45;
  margin-bottom: 20px;
}

.register-form input {
  display: block;
  width: 90%;
  margin-bottom: 30px;
  padding: 14px;
  border: 1px solid #ccc;
  border-radius: 20px;
}

.register-form button {
  background-color: #113f45;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  width: 150px;
  height: 48px;
  margin-left: auto;
  margin-right: auto;
  display: block;

  
}

.form-links {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  font-size: 14px;
}

.form-links a {
  text-decoration: none;
  color: #555;
}

.icon-section {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 20px;
}

.icon-box {
  border-radius: 30px;
  padding: 40px;
}

.icon-box img {
  width: 200px;
  height: auto;

}

 </style>
</head>
<body>
  <div class="page-container">
    <h2 class="page-title">Register Here</h2>
    {% for message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
    <div class="register-container">
      <div class="form-section">
        <form method="post" class="register-form">
          {% csrf_token %}
          <input type="text" placeholder="Full Name"  name="fullname"/>
           <input type="text" placeholder="username" name="username"/>
          <input type="tel" placeholder="Phone number" name="phonenumber"/>
          <input type="password" placeholder="Password" name="password"/>
          <input type="password" placeholder="Confirm Password" name="confirm_password"/>
          <button type="submit">Register</button>
        </form>
      </div>
      <div class="icon-section">
        <div class="icon-box">
          <img src="{% static 'Images/dd2.png' %}" alt="Register Icon">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
